name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev

  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rubika_publisher
          POSTGRES_USER: rubika_user
          POSTGRES_PASSWORD: change_this_db_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rubika_user -d rubika_publisher"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+psycopg://rubika_user:change_this_db_password@localhost:5432/rubika_publisher
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compile
        run: python -m compileall app

      - name: Check migrations
        run: |
          alembic heads
          alembic upgrade head
          alembic current

      - name: Import app
        run: python -c "from app.main import app; print(app.title)"

      - name: Test
        run: pytest
