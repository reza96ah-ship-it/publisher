services:
  postgres:
    image: postgres:16-alpine
    container_name: rubika_publisher_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rubika_publisher}
      POSTGRES_USER: ${POSTGRES_USER:-rubika_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_db_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rubika_user} -d ${POSTGRES_DB:-rubika_publisher}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rubika_publisher_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: rubika_publisher_backend
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - ./backend/app:/app/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
    container_name: rubika_publisher_worker
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - ./backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker.celery_app worker --loglevel=info

  frontend:
    build:
      context: ./frontend
    container_name: rubika_publisher_frontend
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next:
